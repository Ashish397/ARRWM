config_name: causal-lora-diffusion-teacher
load_checkpoint_config_name: causal-lora-diffusion-teacher

trainer: causal_lora_diffusion

seed: 0
mixed_precision: true
autocast_dtype: bf16
max_iters: 30000
log_interval: 10
ckpt_interval: 50
max_grad_norm: 1.0
auto_resume: true
allow_checkpoint_config_mismatch: true
wandb_key: 998657fa4d2f50cc5d5cd33330f94255137a1221
wandb_entity: ashish397-university-of-exeter
wandb_project: frodobots_wm
wandb_run_name: z-critic-v12-probe-fixes
wandb_group: causal-lora-teacher
wandb_tags:
  - causal
  - teacher-forcing
  - ar-diffusion
  - streaming
  - z-critic

# Causal-specific settings
teacher_forcing: true
num_frame_per_block: 3
context_frames: 3               # clean context prepended to each window (one full block)
noise_augmentation_max_timestep: 0

# Streaming lockstep training (LockstepRideBatcher)
#   Each step loads window_size + context_frames = 24 latent frames.
#   The first 21 become clean_x, the last 21 become noisy_x (shifted by 3).
#   Loss is computed on 7 uniform chunks of 3 (the 21 noisy frames).
streaming_chunk_size: 21        # supervised target length per window

# Held-out evaluation
test_start_index: 0             # first zarr index reserved for eval
test_num_rides: 20              # number of rides held out for evaluation
eval_interval: 50               # run eval every N steps (rank 0 only)
eval_inference_steps: 48        # ODE steps for eval generation
grad_norm_interval: 50          # log gradient norms every N steps

# Data -- zarr ride-level pipeline
encoded_root: /projects/u6ej/fbots/frodobots_encoded
caption_root: /projects/u6ej/fbots/frodobots_captions/train
motion_root: /projects/u6ej/fbots/frodobots_motion
ss_vae_checkpoint: action_query/checkpoints/ss_vae_8free.pt

# Action conditioning (z2=turn, z7=forward from 8D ss_vae latent)
model_variant: action-injection
raw_action_dim: 2
action_dims: [2, 7]              # indices into the 8D z_actions to keep
enable_adaln_zero: true
action_conditioning_mode: both  # adaln | action_tokens | both

# LoRA adapter settings
adapter:
  type: lora
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: bfloat16

# Optimizer
lr: 5.0e-05
beta1: 0.9
beta2: 0.999
weight_decay: 0.01
batch_size: 1
gradient_accumulation_steps: 1
warmup_steps: 200

# Model settings
model_name: Wan2.1-T2V-1.3B
num_training_frames: 21
num_train_timestep: 1000
denoising_loss_type: flow
gradient_checkpointing: true
num_workers: 8

model_kwargs:
  timestep_shift: 5.0
  local_attn_size: -1
  sink_size: 0

# Pretrained LoRA weights to initialise from (bidirectional run checkpoint).
# Only the 'lora' key is loaded; optimizer and step are NOT restored.
pretrained_lora_ckpt: /scratch/u6ej/as1748.u6ej/frodobots/pretrained_weights/retrain_no_gan_256/logs/diffusion_lora_step0018600.pt

# Z-predictor critic (timestep-conditioned, action-aware differentiable proxy)
action_critic_enabled: true
action_critic_dims: [2, 7]              # commanded action dims (input to critic)
action_critic_z_out_dim: 8              # predict full 8D ss_vae latent
action_critic_z_loss_weight: 1.0        # weight for critic z-prediction loss
generator_action_z_guidance_weight: 1.5 # generator guidance via z-prediction
z_guidance_warmup_steps: 200            # linearly ramp guidance weight after LR warmup
critic_lr: 3.0e-04                      # separate critic learning rate
critic_updates_per_step: 2              # critic optimizer steps per generator step
action_critic_base_channels: 128        # 3D CNN stem width
action_critic_num_blocks: 4             # residual blocks in trunk

# State action head — cross-attention probes tapping transformer at multiple depths
state_head_enabled: true
state_probe_mode: true                  # use cross-attention probes instead of in-sequence tokens
state_probe_dim: 256                    # probe hidden dimension
state_probe_n_taps: 6                   # number of transformer layers to tap
state_probe_num_heads: 8                # attention heads per probe layer
state_head_loss_weight: 1.5
state_head_out_dim: 2                   # predict teacher z2/z7 only

# Frozen-readout generator guidance (state-token head as differentiable evaluator)
state_guidance_weight: 0.5              # weight for frozen-readout guidance loss
state_guidance_warmup_steps: 200        # ramp guidance after LR warmup
state_guidance_action_scale: 1.1        # overshoot multiplier on commanded actions

# Logging
logdir: /scratch/u6ej/as1748.u6ej/ARRWM/logs/causal_lora_teacher
